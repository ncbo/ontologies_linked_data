version: '3.8'

services:
  op_solr:
    image: solr:8.8
    volumes:
      - ./solr_configsets:/configsets:ro
    ports:
      - "8983:8983"
    command: >
      bash -c "precreate-core term_search_bootstrap /configsets/term_search
      && precreate-core property_search_bootstrap /configsets/property_search
      && solr-foreground"
