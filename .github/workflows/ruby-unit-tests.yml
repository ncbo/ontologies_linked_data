name: Ruby Unit Tests

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - '**'         # ignore all tag pushes
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
          #triplestore: [ 'fs', 'ag', 'vo', 'gd' ]
         triplestore: [ 'fs', 'ag' ]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: create config.rb file
      run: cp config/config.test.rb config/config.rb
    - name: Run unit tests
    - name: Build docker container
      run: docker compose  -f dev/compose/linux/${{ matrix.triplestore }}.yml --profile linux build
    - name: Run unit tests
      run: |
        ci_env=`bash <(curl -s https://codecov.io/env)`
        docker compose -f docker-compose.yml \
        -f dev/compose/linux/${{ matrix.triplestore }}.yml \
        --profile linux \
        --profile ${{ matrix.triplestore }} \
        run $ci_env -e CI=true --build test-linux bundle exec rake test TESTOPTS="-v"
        # docker compose rake test:docker:${{ matrix.triplestore }}:linux TESTOPTS="-v"
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        flags: unittests
        verbose: true
        fail_ci_if_error: false # optional (default = false)
